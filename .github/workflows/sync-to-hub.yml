name: Sync to Hugging Face Hub

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure identity
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Delete the large notebook folder
          rm -rf notebook/
          
          # 3. Create a clean branch with NO history to bypass the 10MB limit
          git checkout --orphan temp-branch
          git add -A
          git commit -m "Initial sync to HF without notebooks"
          
          # 4. Force push the clean branch to HF's main branch
          git remote add hf https://pavandoddavarapu:$HF_TOKEN@huggingface.co/spaces/pavandoddavarapu/anpr_atcc_project
          git push --force hf temp-branch:main
