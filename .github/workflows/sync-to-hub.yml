      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 1. Configure identity
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 2. Remove notebooks and create a brand new, clean branch history
          rm -rf notebook/
          git checkout --orphan temp-branch
          git add -A
          git commit -m "Initial sync to HF without notebooks"
          
          # 3. Force push this clean "single-commit" branch to HF's main branch
          git remote add hf https://pavandoddavarapu:$HF_TOKEN@huggingface.co/spaces/pavandoddavarapu/anpr_atcc_project
          git push --force hf temp-branch:main
