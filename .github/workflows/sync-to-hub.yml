name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # Force clean state by removing notebooks and large files
          rm -rf notebook/
          
          # Create a new branch with NO history to bypass size limits for old commits
          git checkout --orphan temp-branch
          git add -A
          git commit -m "Clean sync to Hugging Face"
          
          # Push to the Space
          git remote add hf https://pavandoddavarapu:$HF_TOKEN@huggingface.co/spaces/pavandoddavarapu/anpr_atcc_project
          git push --force hf temp-branch:main
