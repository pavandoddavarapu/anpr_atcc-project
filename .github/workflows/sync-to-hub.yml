name: Sync to Hugging Face Hub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          
          # 1. DELETE the files Hugging Face is rejecting
          rm -rf notebook/
          rm -f Agile_Document.xlsm
          
          # 2. Create a clean branch with NO history to bypass the 10MB limit
          git checkout --orphan temp-branch
          git add -A
          git commit -m "Deployment sync: removed blocked binary files"
          
          # 3. Force push to Hugging Face
          git remote add hf https://pavandoddavarapu:$HF_TOKEN@huggingface.co/spaces/pavandoddavarapu/anpr_atcc_project
          git push --force hf temp-branch:main
